# =============================================================
#  CD — Continuous Delivery
#
#  Triggered on every push / merge to `main`.
#
#  Pipeline:
#    1. build-backend   — compile source → fat JAR artifact
#    2. build-push-images — build container images and PUSH
#                           to GitHub Container Registry (ghcr.io)
#                           using the built-in GITHUB_TOKEN.
#
#  After a successful run, images are available at:
#    ghcr.io/<your-github-username>/quicktask-backend:latest
#    ghcr.io/<your-github-username>/quicktask-frontend:latest
#
#  Pull them in Podman Desktop using docker-compose.prod.yml.
# =============================================================

name: CD

on:
  push:
    branches: [ main ]

# Grant write access to publish packages to ghcr.io
permissions:
  contents: read
  packages: write

jobs:

  # -----------------------------------------------------------
  # Job 1: Compile & package the Spring Boot JAR
  # -----------------------------------------------------------
  build-backend:
    name: Build Backend JAR
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build production JAR (tests already run in CI)
        working-directory: backend
        run: mvn clean package -DskipTests -B

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-jar
          path: backend/target/*.jar
          retention-days: 7

  # -----------------------------------------------------------
  # Job 2: Build container images and push to ghcr.io
  # -----------------------------------------------------------
  build-push-images:
    name: Build & Push Container Images
    runs-on: ubuntu-latest
    needs: build-backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download backend JAR
        uses: actions/download-artifact@v4
        with:
          name: backend-jar
          path: backend/target/

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Log in to GitHub Container Registry using the automatic GITHUB_TOKEN
      # — no secrets configuration required.
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute short SHA and lowercase owner
        id: vars
        run: |
          echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
          echo "owner=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      # Build the backend image and push two tags:
      #   :latest          — always overwritten (used by docker-compose.prod.yml)
      #   :<short-sha>     — immutable, used for rollbacks / traceability
      - name: Build & push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ steps.vars.outputs.owner }}/quicktask-backend:latest
            ghcr.io/${{ steps.vars.outputs.owner }}/quicktask-backend:${{ steps.vars.outputs.sha_short }}
          labels: |
            org.opencontainers.image.title=QuickTask Backend
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.created=${{ github.event.repository.updated_at }}

      - name: Build & push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ steps.vars.outputs.owner }}/quicktask-frontend:latest
            ghcr.io/${{ steps.vars.outputs.owner }}/quicktask-frontend:${{ steps.vars.outputs.sha_short }}
          labels: |
            org.opencontainers.image.title=QuickTask Frontend
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.created=${{ github.event.repository.updated_at }}

      - name: Smoke-test backend image starts
        run: |
          docker run --rm -d \
            --name quicktask-smoke \
            --env DB_URL="jdbc:mysql://localhost:3306/taskdb" \
            --env DB_USERNAME=dummyuser \
            --env DB_PASSWORD=dummypass \
            --env SPRING_JPA_HIBERNATE_DDL_AUTO=none \
            ghcr.io/${{ steps.vars.outputs.owner }}/quicktask-backend:latest
          sleep 12
          docker stop quicktask-smoke 2>/dev/null || true
          echo "Smoke test passed — JVM started without immediate crash."

      - name: Print published image URLs
        run: |
          echo ""
          echo "Images published to GitHub Container Registry:"
          echo "  ghcr.io/${{ steps.vars.outputs.owner }}/quicktask-backend:latest"
          echo "  ghcr.io/${{ steps.vars.outputs.owner }}/quicktask-backend:${{ steps.vars.outputs.sha_short }}"
          echo "  ghcr.io/${{ steps.vars.outputs.owner }}/quicktask-frontend:latest"
          echo "  ghcr.io/${{ steps.vars.outputs.owner }}/quicktask-frontend:${{ steps.vars.outputs.sha_short }}"
          echo ""
          echo "Run locally with Podman Desktop:"
          echo "  cp .env.example .env   # set GITHUB_OWNER=${{ steps.vars.outputs.owner }}"
          echo "  podman-compose -f docker-compose.prod.yml up"
