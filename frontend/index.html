<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>QuickTask — Kanban Board</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>

    <!-- ===== Auth View (shown when not logged in) ===== -->
    <div id="auth-view" class="auth-overlay">
        <div class="auth-card">
            <h1>&#9889; QuickTask</h1>
            <p class="auth-subtitle">Your personal Kanban board</p>
            <div class="auth-tabs">
                <button id="tab-login" class="auth-tab active">Login</button>
                <button id="tab-register" class="auth-tab">Register</button>
            </div>
            <form id="login-form" class="auth-form">
                <div class="form-group">
                    <label for="login-username">Username</label>
                    <input type="text" id="login-username" required autocomplete="username" />
                </div>
                <div class="form-group">
                    <label for="login-password">Password</label>
                    <input type="password" id="login-password" required autocomplete="current-password" />
                </div>
                <div id="login-error" class="auth-error" hidden></div>
                <button type="submit" class="btn-primary auth-btn">Login</button>
            </form>
            <form id="register-form" class="auth-form" hidden>
                <div class="form-group">
                    <label for="reg-username">Username</label>
                    <input type="text" id="reg-username" required autocomplete="username" />
                </div>
                <div class="form-group">
                    <label for="reg-password">Password</label>
                    <input type="password" id="reg-password" required autocomplete="new-password" />
                </div>
                <div id="register-error" class="auth-error" hidden></div>
                <button type="submit" class="btn-primary auth-btn">Register</button>
            </form>
        </div>
    </div>

    <!-- ===== Board Container (hidden until logged in) ===== -->
    <div id="board-container" hidden>

    <!-- ===== App Header ===== -->
    <header class="app-header">
        <div class="header-inner">
            <h1>&#9889; QuickTask</h1>
            <input type="search" id="search-input" class="search-input" placeholder="&#128269; Search tasks…" autocomplete="off" />
            <button id="btn-add-task" class="btn-primary">+ New Task</button>
            <div class="header-user" id="header-user" hidden>
                <span id="username-display" class="username-display"></span>
                <button id="btn-logout" class="btn-secondary btn-logout">Logout</button>
            </div>
        </div>
    </header>

    <!-- ===== Error Banner ===== -->
    <div id="error-banner" class="error-banner" hidden role="alert"></div>

    <!-- ===== Kanban Board ===== -->
    <main id="board" class="board">

        <!-- To Do -->
        <section class="column column-todo">
            <div class="column-header">
                <h2>To Do</h2>
                <span id="count-TODO" class="task-count">0</span>
            </div>
            <div id="list-TODO" class="task-list"></div>
        </section>

        <!-- In Progress -->
        <section class="column column-inprogress">
            <div class="column-header">
                <h2>In Progress</h2>
                <span id="count-IN_PROGRESS" class="task-count">0</span>
            </div>
            <div id="list-IN_PROGRESS" class="task-list"></div>
        </section>

        <!-- Done -->
        <section class="column column-done">
            <div class="column-header">
                <h2>Done</h2>
                <span id="count-DONE" class="task-count">0</span>
            </div>
            <div id="list-DONE" class="task-list"></div>
        </section>

    </main>

    </div><!-- /#board-container -->

    <!-- ===== New Task Modal ===== -->
    <div id="task-modal" class="modal-overlay" hidden role="dialog" aria-modal="true" aria-labelledby="modal-title">
        <div class="modal">
            <div class="modal-header">
                <h2 id="modal-title">New Task</h2>
                <button id="btn-close-modal" class="btn-icon" aria-label="Close modal">&#x2715;</button>
            </div>
            <form id="new-task-form" novalidate>
                <div class="form-group">
                    <label for="task-title">Title <span class="required" aria-hidden="true">*</span></label>
                    <input
                        type="text"
                        id="task-title"
                        name="title"
                        required
                        maxlength="200"
                        placeholder="Enter a task title…"
                        autocomplete="off"
                    />
                </div>
                <div class="form-group">
                    <label for="task-desc">Description <span class="optional">(optional)</span></label>
                    <textarea
                        id="task-desc"
                        name="description"
                        rows="3"
                        maxlength="1000"
                        placeholder="Add more context…"
                    ></textarea>
                </div>
                <div class="form-group">
                    <label for="task-priority">Priority</label>
                    <select id="task-priority" name="priority">
                        <option value="LOW">&#128994; Low</option>
                        <option value="MEDIUM" selected>&#128993; Medium</option>
                        <option value="HIGH">&#128308; High</option>
                    </select>
                </div>
                <div class="form-actions">
                    <button type="button" id="btn-cancel" class="btn-secondary">Cancel</button>
                    <button type="submit" id="btn-submit" class="btn-primary">Create Task</button>
                </div>
            </form>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
